<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F7F6F2; color: #1C1B18; -webkit-tap-highlight-color: transparent; }
input, button, select, textarea { font-family: inherit; }
button { cursor: pointer; border: none; background: none; }

/* ── CSS variables ── */
:root {
  --bg:       #F7F6F2;
  --bg-deep:  #EDEAE2;
  --surface:  #FFFFFF;
  --hi:       #F2F0EA;
  --border:   #E0DDD5;
  --border-m: #C8C4BA;
  --accent:   #1A7F5A;
  --accent-l: #E8F5EF;
  --gold:     #A0721A;
  --gold-l:   #FDF3DC;
  --coral:    #C94040;
  --coral-l:  #FDEAEA;
  --muted:    #9B9688;
  --text:     #1C1B18;
  --sub:      #6B6860;
  --sh:       rgba(0,0,0,0.07);
  --sh-md:    rgba(0,0,0,0.14);
  --f0: #1A7F5A; --f1: #2563EB; --f2: #E11D48; --f3: #9333EA;
}

/* ── App shell ── */
#app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--surface); box-shadow: 0 0 40px rgba(0,0,0,0.12); position: relative; overflow: hidden; }
#screen { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* ── Status bar spacer (iOS safe area) ── */
.status-bar { height: env(safe-area-inset-top, 44px); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 20px 8px; font-size: 12px; font-weight: 700; }
.home-indicator { height: calc(env(safe-area-inset-bottom, 0px) + 28px); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.home-indicator-bar { width: 130px; height: 5px; border-radius: 3px; background: var(--border-m); opacity: 0.5; }

/* ── Nav bar ── */
.nav-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 6px var(--sh); }
.nav-title { font-size: 15px; font-weight: 800; font-family: Georgia, "Times New Roman", serif; color: var(--text); }
.nav-title span { color: var(--accent); }
.nav-btn { background: var(--hi); border: 1px solid var(--border); color: var(--sub); border-radius: 9px; padding: 6px 13px; font-size: 12px; font-weight: 600; }
.nav-icon-btn { width: 32px; height: 32px; border-radius: 16px; background: var(--hi); border: 1px solid var(--border); color: var(--sub); font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all .14s; }
.nav-icon-btn:hover { background: var(--accent-l); color: var(--accent); border-color: var(--accent); }

/* ── Screens ── */
.screen-pad { padding: 22px 18px 100px; }
.step-label { color: var(--accent); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.screen-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.screen-sub { color: var(--sub); font-size: 13px; line-height: 1.5; margin-bottom: 20px; }

/* ── Cards ── */
.card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 15px; box-shadow: 0 2px 8px var(--sh); transition: border-color .2s; }
.card.confirmed { border-color: var(--accent); }

/* ── Pills ── */
.pills { display: flex; gap: 7px; flex-wrap: wrap; }
.pill { background: var(--surface); border: 1.5px solid var(--border); color: var(--sub); border-radius: 99px; padding: 6px 14px; font-size: 12px; font-weight: 600; white-space: nowrap; box-shadow: 0 1px 3px var(--sh); transition: all .16s; }
.pill.active { background: #1A7F5A18; color: var(--accent); border-color: var(--accent); }
.pill:hover { border-color: var(--accent); color: var(--accent); }

/* ── Buttons ── */
.btn-primary { width: 100%; background: var(--accent); color: #fff; border-radius: 13px; padding: 15px 0; font-size: 15px; font-weight: 800; box-shadow: 0 4px 20px rgba(26,127,90,.35); transition: transform .13s, opacity .13s; }
.btn-primary:disabled { background: var(--hi); color: var(--muted); box-shadow: none; cursor: not-allowed; }
.btn-primary:not(:disabled):active { transform: scale(0.97); }
.btn-secondary { background: var(--hi); border: 1px solid var(--border); color: var(--sub); border-radius: 9px; padding: 6px 12px; font-size: 11px; font-weight: 700; transition: all .13s; }
.btn-accent-outline { background: var(--accent-l); border: 1px solid rgba(26,127,90,.3); color: var(--accent); border-radius: 9px; padding: 6px 12px; font-size: 11px; font-weight: 700; }
.btn-coral-outline { background: var(--coral-l); border: 1px solid rgba(201,64,64,.3); color: var(--coral); border-radius: 9px; padding: 5px 11px; font-size: 11px; }

/* ── Category grid ── */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cat-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: 11px; padding: 11px; display: flex; align-items: center; gap: 8px; transition: all .15s; box-shadow: 0 1px 4px var(--sh); }
.cat-item.on { background: var(--accent-l); border-color: var(--accent); }
.cat-item .icon { font-size: 19px; }
.cat-item .label { font-size: 12px; font-weight: 600; color: var(--sub); }
.cat-item.on .label { color: var(--accent); }
.cat-check { margin-left: auto; color: var(--accent); }

/* ── Avatar ── */
.avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; position: relative; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.avatar .edit-badge { position: absolute; bottom: -2px; right: -2px; width: 17px; height: 17px; border-radius: 9px; background: #1C1B18; border: 2px solid var(--surface); display: flex; align-items: center; justify-content: center; font-size: 7px; }

/* ── Modal overlay ── */
.overlay { position: fixed; inset: 0; background: rgba(28,27,24,.42); display: flex; align-items: flex-end; justify-content: center; z-index: 500; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); animation: fadein .2s; }
.sheet { background: var(--surface); border-radius: 22px 22px 0 0; padding: 20px 20px 48px; width: 100%; max-width: 430px; max-height: 92vh; overflow-y: auto; box-shadow: 0 -6px 40px var(--sh-md); animation: slideup .26s cubic-bezier(.16,1,.3,1); }
.drag-handle { width: 38px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 18px; }
.sheet-title { font-size: 16px; font-weight: 800; color: var(--text); }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* ── Autocomplete ── */
.ac-list { background: var(--surface); border: 1px solid var(--border); border-radius: 11px; overflow: hidden; box-shadow: 0 4px 16px var(--sh-md); margin-top: 4px; }
.ac-item { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 10px 14px; text-align: left; cursor: pointer; color: var(--text); font-size: 13px; display: block; transition: background .1s; }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover { background: var(--accent-l); }

/* ── Inputs ── */
.inp { width: 100%; background: var(--hi); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 13px; outline: none; transition: border-color .15s; }
.inp:focus { border-color: var(--accent); }
.inp.confirmed { border-color: var(--accent); }
.inp-wrap { position: relative; }
.inp-check { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); color: var(--accent); font-weight: 700; font-size: 14px; }

/* ── Map ── */
#map { height: 340px; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
.leaflet-container { font-family: inherit; }

/* ── Fairness bar ── */
.f-bar { display: flex; gap: 2px; height: 6px; border-radius: 4px; overflow: hidden; background: var(--bg-deep); }

/* ── Spinner ── */
.spin { display: inline-block; width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(26,127,90,.25); border-top-color: var(--accent); animation: spin .7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Results banner ── */
.banner { background: linear-gradient(135deg, rgba(26,127,90,.1), rgba(160,114,26,.06)); border-bottom: 1px solid var(--border); padding: 14px 18px; }
.banner-label { color: var(--accent); font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
.banner-title { font-size: 16px; font-weight: 800; }

/* ── Tabs ── */
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
.tab { flex: 1; background: transparent; border: none; border-bottom: 2.5px solid transparent; color: var(--sub); padding: 11px 4px; font-size: 13px; font-weight: 700; transition: all .16s; }
.tab.active { border-bottom-color: var(--accent); color: var(--accent); }

/* ── Venue card ── */
.venue-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 13px; padding: 13px; margin-bottom: 9px; cursor: pointer; transition: all .16s; box-shadow: 0 2px 6px var(--sh); }
.venue-card:hover, .venue-card.open { border-color: var(--accent); box-shadow: 0 4px 18px rgba(26,127,90,.14); }
.venue-icon-box { width: 44px; height: 44px; border-radius: 11px; background: var(--hi); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 21px; flex-shrink: 0; }
.fairness-pct { font-weight: 700; font-size: 11px; }
.fairness-pct.hi { color: var(--accent); }
.fairness-pct.md { color: var(--gold); }
.fairness-pct.lo { color: var(--coral); }

/* ── Home screen ── */
.home-wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; position: relative; background: radial-gradient(ellipse at 25% 15%, rgba(26,127,90,.1) 0%, transparent 55%), var(--bg); }
.home-icon { width: 90px; height: 90px; border-radius: 25px; background: linear-gradient(145deg, var(--accent-l), rgba(26,127,90,.2)); border: 2px solid rgba(26,127,90,.3); display: flex; align-items: center; justify-content: center; font-size: 44px; box-shadow: 0 6px 28px rgba(26,127,90,.18); margin: 0 auto 22px; }
.home-title { font-family: Georgia, "Times New Roman", serif; font-size: 30px; font-weight: 700; line-height: 1.25; text-align: center; margin-bottom: 8px; }
.home-sub { color: var(--sub); font-size: 14px; line-height: 1.65; text-align: center; max-width: 256px; margin: 0 auto 36px; }
.feature-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 36px; }
.feature-chip { background: var(--surface); border: 1px solid var(--border); color: var(--sub); border-radius: 99px; padding: 5px 13px; font-size: 11px; font-weight: 600; box-shadow: 0 1px 4px var(--sh); }

/* ── Info modal items ── */
.info-item { border-radius: 11px; padding: 11px 13px; display: flex; gap: 11px; align-items: flex-start; margin-bottom: 8px; }
.info-item.unique { background: var(--accent-l); border: 1.5px solid rgba(26,127,90,.3); border-left: 4px solid var(--accent); }
.info-item.standard { background: var(--hi); border: 1.5px solid var(--border); border-left: 4px solid var(--border-m); }
.only-badge { background: var(--accent); color: #fff; border-radius: 99px; font-size: 9px; font-weight: 800; padding: 2px 7px; text-transform: uppercase; }

/* ── Progress bar ── */
.progress-bars { display: flex; gap: 5px; margin-bottom: 10px; }
.progress-bar { flex: 1; height: 4px; border-radius: 2px; transition: background .3s; }

/* ── Vibes ── */
.vibes { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.vibe-btn { flex-shrink: 0; border: 1.5px solid var(--border); border-radius: 13px; padding: 9px 13px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all .15s; background: var(--surface); box-shadow: 0 1px 4px var(--sh); }
.vibe-btn.on { background: var(--accent-l); border-color: var(--accent); }
.vibe-btn .vibe-label { font-size: 10px; font-weight: 700; color: var(--sub); white-space: nowrap; }
.vibe-btn.on .vibe-label { color: var(--accent); }

/* ── Vote ── */
.vote-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; gap: 10px; align-items: center; box-shadow: 0 1px 5px var(--sh); }
.vote-btn { background: var(--hi); border: 1.5px solid var(--border); border-radius: 9px; padding: 7px 10px; font-size: 14px; transition: all .14s; }
.vote-btn.up { background: var(--accent-l); border-color: var(--accent); }
.vote-btn.down { background: var(--coral-l); border-color: var(--coral); }

/* ── Area candidate cards ── */
.area-card { background: var(--surface); border: 2px solid var(--border); border-radius: 14px; padding: 14px 15px; margin-bottom: 10px; cursor: pointer; transition: all .18s; box-shadow: 0 2px 8px var(--sh); }
.area-card.selected { border-color: var(--accent); background: var(--accent-l); }
.area-card .area-name { font-weight: 800; font-size: 15px; margin-bottom: 4px; }
.area-card .area-meta { color: var(--sub); font-size: 12px; line-height: 1.5; }
.area-card .area-times { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.area-time-chip { font-size: 11px; font-weight: 600; border-radius: 99px; padding: 3px 10px; border: 1px solid transparent; }

/* ── Toggle switches ── */
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.toggle-row:last-child { border-bottom: none; }
.toggle-label { font-size: 13px; font-weight: 600; color: var(--text); }
.toggle-sub { font-size: 11px; color: var(--sub); margin-top: 1px; }
.toggle { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track { position: absolute; inset: 0; border-radius: 13px; background: var(--border-m); transition: background .2s; cursor: pointer; }
.toggle input:checked + .toggle-track { background: var(--accent); }
.toggle-thumb { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: white; box-shadow: 0 1px 4px rgba(0,0,0,.2); transition: transform .2s; pointer-events: none; }
.toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }
.schema-map { background: #D6EAD7; border-radius: 14px; height: 300px; position: relative; overflow: hidden; border: 1px solid var(--border); }
.schema-road-h { position: absolute; left: 0; right: 0; height: 7px; background: #fff; opacity: .55; }
.schema-road-v { position: absolute; top: 0; bottom: 0; width: 7px; background: #fff; opacity: .55; }
.midpin { position: absolute; width: 22px; height: 22px; border-radius: 11px; background: var(--accent); border: 3px solid white; box-shadow: 0 0 14px rgba(26,127,90,.6); transform: translate(-50%,-50%); z-index: 10; }
.midlabel { position: absolute; background: var(--surface); border: 1px solid var(--accent); border-radius: 6px; padding: 2px 7px; color: var(--accent); font-size: 9px; font-weight: 700; white-space: nowrap; transform: translate(-50%, calc(-100% - 6px)); }
.friend-pin { position: absolute; border-radius: 50%; border: 2.5px solid white; display: flex; align-items: center; justify-content: center; font-size: 14px; overflow: hidden; transform: translate(-50%,-50%); box-shadow: 0 2px 8px rgba(0,0,0,.25); }
.venue-pin { position: absolute; background: white; border: 1.5px solid var(--border); border-radius: 8px; padding: 3px 5px; font-size: 16px; cursor: pointer; box-shadow: 0 2px 6px var(--sh); transform: translate(-50%,-50%); transition: transform .13s; z-index: 5; }
.venue-pin:hover { transform: translate(-50%,-50%) scale(1.18); }
</style>
</head>

function h(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "class") el.className = v;
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false || c === undefined) continue;
    if (typeof c === "string" || typeof c === "number") {
      el.appendChild(document.createTextNode(String(c)));
    } else if (c instanceof Node) {
      el.appendChild(c);
    }
    // silently drop anything else (avoids TypeError on undefined/object)
  }
  return el;
}

function haversineKm(a, b) {
  const R = 6371, dLat = (b.lat-a.lat)*Math.PI/180, dLng = (b.lng-a.lng)*Math.PI/180;
  const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function estimateMins(from, to, mode="driving") {
  const km = haversineKm(from, to);
  const speeds = {driving:40, transit:25, walking:5, cycling:15};
  return Math.max(1, Math.round((km / speeds[mode]) * 60));
}

function midpoint(coords) {
  return { lat: coords.reduce((s,c)=>s+c.lat,0)/coords.length, lng: coords.reduce((s,c)=>s+c.lng,0)/coords.length };
}

function fairnessPct(times) {
  const mx = Math.max(...times), mn = Math.min(...times);
  return mx > 0 ? Math.round((1-(mx-mn)/mx)*100) : 100;
}

function avatarEl(f, size=44) {
  const wrap = h("div", {
    class:"avatar",
    style:`width:${size}px;height:${size}px;background:${f.color}22;border:2.5px solid ${f.color};font-size:${f.photo?0:Math.round(size*.45)}px;`
  });
  if (f.photo) { const img = h("img", {src:f.photo, alt:f.name}); wrap.appendChild(img); }
  else wrap.textContent = f.avatar;
  return wrap;
}

async function nominatimSearch(query) {
  // Include addresses and POIs; exclude pure admin boundaries (country/state level)
  const url = "https://nominatim.openstreetmap.org/search"
    + "?q=" + encodeURIComponent(query)
    + "&format=json&limit=8&addressdetails=1&extratags=0";
  const r = await fetch(url);
  const data = await r.json();
  return data
    .filter(d => {
      // Drop results that are just high-level admin areas with no street precision
      const skip = ["country","state","state_district"];
      return !skip.includes(d.type) && !skip.includes(d.addresstype);
    })
    .map(d => {
      const a = d.address || {};
      // Build a label that shows enough detail to distinguish results
      const street   = [a.house_number, a.road].filter(Boolean).join(" ");
      const locality = a.neighbourhood || a.suburb || a.quarter || a.village || a.town || "";
      const city     = a.city || a.municipality || a.county || "";
      const state    = a.state || "";
      const country  = a.country_code ? a.country_code.toUpperCase() : "";
      // For US addresses show: "123 Main St, Neighborhood, City, CA"
      // For international: "Street, City, Country"
      let label;
      if (street) {
        label = [street, locality||city, state||country].filter(Boolean).join(", ");
      } else if (locality) {
        label = [locality, city, state, country].filter(Boolean).join(", ");
      } else {
        label = [city, state, country].filter(Boolean).join(", ") || d.display_name.split(",").slice(0,3).join(",").trim();
      }
      return { label, fullAddress: d.display_name, lat: +d.lat, lng: +d.lon, type: d.type };
    })
    .filter((d,i,arr) => arr.findIndex(x=>x.label===d.label)===i); // deduplicate
}

async function reverseGeocode(lat, lng) {
  const url = "https://nominatim.openstreetmap.org/reverse?lat=" + lat + "&lon=" + lng + "&format=json&zoom=16";
  const r = await fetch(url);
  const d = await r.json();
  const a = d.address || {};
  const street   = [a.house_number, a.road].filter(Boolean).join(" ");
  const locality = a.neighbourhood || a.suburb || a.quarter || a.village || a.town || "";
  const city     = a.city || a.municipality || a.county || "";
  const state    = a.state || "";
  let label;
  if (street) {
    label = [street, locality||city, state].filter(Boolean).join(", ");
  } else if (locality) {
    label = [locality, city, state].filter(Boolean).join(", ");
  } else {
    label = [city, state].filter(Boolean).join(", ") || d.display_name.split(",").slice(0,3).join(",").trim();
  }
  return { label, lat, lng };
}

// Fetch a single isochrone polygon for one location at given minutes
async function fetchIsochrone(lat, lng, minutes, profile) {
  const url = `${ORS_BASE}/v2/isochrones/${profile}`;
  const body = {
    locations: [[lng, lat]],
    range: [minutes * 60],
    range_type: "time",
    smoothing: 0.1,
    area_units: "km",
  };
  const r = await fetch(url, {
    method: "POST",
    headers: { "Authorization": ORS_KEY, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`ORS isochrone HTTP ${r.status}`);
  return await r.json();  // GeoJSON FeatureCollection
}

// Reverse-geocode a coordinate to a neighborhood/area name via Nominatim
async function areaLabel(lat, lng) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=14`;
    const r = await fetch(url);
    const d = await r.json();
    const a = d.address || {};
    return a.neighbourhood || a.suburb || a.quarter || a.village || a.town || a.city_district || a.city || a.county || "Area";
  } catch { return "Area"; }
}

// Core Phase 1: compute candidate meet areas using isochrone intersections
// Strategy: step up time intervals until intersections exist; score by fairness
async function findCandidateAreas() {
  const activeFriends = STATE.friends.filter(f => f.coords);
  if (activeFriends.length < 2) throw new Error("Need at least 2 locations");

  const profile = ORS_PROFILE[STATE.travelMode] || "driving-car";

  // Time steps to try (minutes). Start at 20, step up until intersection found.
  const timeSteps = [20, 25, 30, 40, 50, 60, 75];
  let candidatePoints = [];

  for (let si = 0; si < timeSteps.length; si++) {
    const mins = timeSteps[si];
    // Fetch isochrone for each friend in parallel
    const isoResults = await Promise.all(
      activeFriends.map(f => fetchIsochrone(f.coords.lat, f.coords.lng, mins, profile))
    );

    // Extract first polygon from each result
    const polys = isoResults.map(r => r.features?.[0]).filter(Boolean);
    if (polys.length < activeFriends.length) continue;

    // Intersect all polygons
    let intersection = polys[0];
    for (let i = 1; i < polys.length; i++) {
      try { intersection = turf.intersect(intersection, polys[i]); }
      catch { intersection = null; }
      if (!intersection) break;
    }
    if (!intersection) continue;

    // Sample points within intersection (centroid + up to 4 distributed points)
    const pts = [];

    // Centroid of intersection
    const centroid = turf.centroid(intersection);
    pts.push({ lat: centroid.geometry.coordinates[1], lng: centroid.geometry.coordinates[0] });

    // Additional distributed points via bbox grid
    const bbox = turf.bbox(intersection);
    const gridCandidates = [
      { lat: (bbox[1]*2+bbox[3])/3,   lng: (bbox[0]+bbox[2])/2 },
      { lat: (bbox[1]+bbox[3]*2)/3,   lng: (bbox[0]+bbox[2])/2 },
      { lat: (bbox[1]+bbox[3])/2,     lng: (bbox[0]*2+bbox[2])/3 },
      { lat: (bbox[1]+bbox[3])/2,     lng: (bbox[0]+bbox[2]*2)/3 },
    ];
    for (let gi = 0; gi < gridCandidates.length; gi++) {
      const pt = gridCandidates[gi];
      const turfPt = turf.point([pt.lng, pt.lat]);
      if (turf.booleanPointInPolygon(turfPt, intersection)) pts.push(pt);
    }

    // Score each point by travel-time fairness (using haversine estimate for now)
    const isoBbox = [bbox[0], bbox[1], bbox[2], bbox[3]]; // [minLng, minLat, maxLng, maxLat]
    for (let pi = 0; pi < pts.length; pi++) {
      const pt = pts[pi];
      const times = activeFriends.map(f => estimateMins(f.coords, pt, STATE.travelMode));
      const mx = Math.max(...times), mn = Math.min(...times);
      const fairness = mx > 0 ? Math.round((1 - (mx - mn) / mx) * 100) : 100;
      candidatePoints.push({ lat: pt.lat, lng: pt.lng, times, fairness, mins, bbox: isoBbox });
    }

    // If we have enough candidates, stop stepping up
    if (candidatePoints.length >= 5) break;
  }

  if (candidatePoints.length === 0) {
    throw new Error("Could not find a reachable overlap area. Try increasing travel range or check that locations are driveable.");
  }

  // Sort by fairness desc, deduplicate by label name then 5km proximity, take top 5
  candidatePoints.sort((a, b) => b.fairness - a.fairness);
  const deduped = [];
  // First pass: reverse-geocode all so we can dedupe by name
  const allLabels = await Promise.all(candidatePoints.map(p => areaLabel(p.lat, p.lng)));
  const seenLabels = new Set();
  for (let di = 0; di < candidatePoints.length; di++) {
    const pt = candidatePoints[di];
    const label = allLabels[di];
    const tooClose = deduped.some(d => haversineKm(d, pt) < 5);
    if (seenLabels.has(label) || tooClose) continue;
    seenLabels.add(label);
    deduped.push({ ...pt, label });
    if (deduped.length >= 5) break;
  }

  return deduped;
}


async function fetchVenues(lat, lng, catIds, bbox) {
  // Use the ORS isochrone bbox as the Nominatim viewbox when available.
  // bbox = [minLng, minLat, maxLng, maxLat]. Falls back to 4km radius box.
  let viewbox;
  if (bbox) {
    viewbox = bbox.join(",");
  } else {
    const deg = (4000 / 111000) * 1.5;
    viewbox = [lng-deg, lat-deg, lng+deg, lat+deg].join(",");
  }

  // Nominatim free-text search bounded to a viewbox around the midpoint.
  // ?q= is the only reliably supported search parameter across all result types.
  // amenity=/leisure= as standalone params return 400 — confirmed in production.
  const SEARCH_TERMS = {
    restaurant: "restaurant",
    bar:        "bar",
    cafe:       "cafe",
    golf:       "golf course",
    spa:        "day spa",
    museum:     "museum",
    theatre:    "theatre",
    park:       "park",
    cinema:     "cinema",
    nightclub:  "nightclub",
  };

  const results = [];
  const seen = new Set();

  for (let ci = 0; ci < catIds.length; ci++) {
    const id   = catIds[ci];
    const term = SEARCH_TERMS[id];
    const cat  = CATEGORIES.find(c=>c.id===id);
    if (!term || !cat) continue;

    try {
      const url = "https://nominatim.openstreetmap.org/search"
        + "?q=" + encodeURIComponent(term)
        + "&format=json&limit=20&addressdetails=1"
        + "&bounded=1&viewbox=" + viewbox;

      const r = await fetch(url);
      if (!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();

      for (let di = 0; di < data.length; di++) {
        const d = data[di];
        if (!d.lat || !d.lon) continue;
        if (seen.has(d.place_id)) continue;
        seen.add(d.place_id);

        const a    = d.address || {};
        const name = a.amenity || a.leisure || a.tourism || a.shop
                  || d.display_name.split(",")[0].trim();
        if (!name) continue;

        const street  = [a.house_number, a.road].filter(Boolean).join(" ");
        const city    = a.city || a.town || a.village || a.suburb || "";
        const state   = a.state || "";
        const address = [street, city, state].filter(Boolean).join(", ");

        results.push({
          id: d.place_id, name, cat: id, icon: cat.icon,
          lat: +d.lat, lng: +d.lon,
          address, phone:"", website:"", cuisine:"", opening:"",
        });
      }
    } catch(e) {
      console.warn("Venue search failed for", id, e.message);
    }
    // Respect Nominatim rate limit — 1 req/sec max
    await new Promise(res => setTimeout(res, 350));
  }

  return results;
}

/* ══════════════════════════════════════════════════════════════
   AUTOCOMPLETE WIDGET (reusable)
══════════════════════════════════════════════════════════════ */
function buildAutocomplete({placeholder, initialValue="", onSelect, onInput}) {
  let results = [];
  let chosen  = null;
  let acTimer = null;  // local to this instance — fixes multi-widget interference
  // Unique id to prevent Safari native autocomplete from cross-contaminating instances
  const uid = "ac_" + Math.random().toString(36).slice(2);

  const inpWrap = h("div", {class:"inp-wrap"});
  const inp = h("input", {class:"inp", placeholder, value:initialValue, type:"text", autocomplete:"street-address", autocorrect:"off", autocapitalize:"words", spellcheck:"false", name:uid});
  const check = h("span", {class:"inp-check", style:"display:none"}, "✓");
  const drop = h("div", {class:"ac-list", style:"display:none"});
  inpWrap.append(inp, check, drop);

  function showDrop() {
    drop.innerHTML = "";
    drop.style.display = results.length ? "block" : "none";
    results.forEach(r => {
      const item = h("button", {class:"ac-item"});
      item.appendChild(h("div", {style:"font-weight:600;font-size:13px"}, "📍  " + r.label));
      if (r.fullAddress && r.fullAddress !== r.label) {
        const sub = r.fullAddress.split(",").slice(0,4).join(",");
        item.appendChild(h("div", {style:"font-size:11px;color:var(--sub);margin-top:2px;padding-left:18px"}, sub));
      }
      item.addEventListener("click", () => {
        chosen = r; inp.value = r.label; inp.classList.add("confirmed");
        check.style.display = "block"; drop.style.display = "none";
        if (onSelect) onSelect(r);
      });
      drop.appendChild(item);
    });
  }

  inp.addEventListener("input", () => {
    const val = inp.value.trim();
    chosen = null; check.style.display = "none"; inp.classList.remove("confirmed");
    if (onInput) onInput(val);
    clearTimeout(acTimer);
    if (val.length < 3) { drop.style.display = "none"; return; }
    acTimer = setTimeout(async () => {
      try { results = await nominatimSearch(val); showDrop(); }
      catch { /* network error */ }
    }, 400);
  });

  // Close drop on outside click
  document.addEventListener("click", e => { if(!inpWrap.contains(e.target)) drop.style.display="none"; }, true);

  return { el: inpWrap, getChosen: ()=>chosen, setValue: v=>{ inp.value=v; } };
}

function openModal(name, data={}) {
  setState({modal:name, modalData:data});
  renderModal();
}
function closeModal() {
  setState({modal:null, modalData:{}});
  document.getElementById("modal-root")?.remove();
}

function renderModal() {
  document.getElementById("modal-root")?.remove();
  if (!STATE.modal) return;
  const root = h("div", {id:"modal-root"});
  document.body.appendChild(root);

  const overlay = h("div", {class:"overlay"});
  overlay.addEventListener("click", e => { if(e.target===overlay) closeModal(); });
  root.appendChild(overlay);

  const sheet = h("div", {class:"sheet"});
  overlay.appendChild(sheet);
  sheet.appendChild(h("div", {class:"drag-handle"}));

  if (STATE.modal === "info")     buildInfoModal(sheet);
  if (STATE.modal === "avatar")   buildAvatarModal(sheet, STATE.modalData);
  if (STATE.modal === "location") buildLocationModal(sheet, STATE.modalData);
  if (STATE.modal === "contact")  buildContactModal(sheet, STATE.modalData);
  if (STATE.modal === "venue")    buildVenueModal(sheet, STATE.modalData);
}

          f.u ? h("span", {class:"only-badge"}, "Only here") : null

/* ── Avatar modal ── */
function buildAvatarModal(sheet, {index}) {
  const f = STATE.friends[index];
  let emoji = f.avatar, color = f.color, photo = f.photo;
  const fileRef = h("input", {type:"file", accept:"image/*", style:"display:none"});
  sheet.appendChild(fileRef);

  const hdr = h("div", {style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"});
  hdr.append(h("div", {class:"sheet-title"}, "Customise Avatar"), closeBtn());
  sheet.appendChild(hdr);

  // Preview
  const preview = h("div", {style:"display:flex;align-items:center;gap:14px;background:var(--hi);border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:16px"});
  const previewAv = h("div", {class:"avatar", style:`width:58px;height:58px;background:${color}22;border:3px solid ${color};font-size:${photo?0:26}px`});
  if (photo) { const img=h("img",{src:photo,alt:""}); previewAv.appendChild(img); }
  else previewAv.textContent = emoji;
  preview.append(previewAv, h("div", {}, h("div", {style:"font-weight:700;font-size:15px"}, f.name), h("div", {style:"color:var(--sub);font-size:12px"}, f.location||"No location yet")));
  sheet.appendChild(preview);

  function refreshPreview() {
    previewAv.style.fontSize = photo ? "0" : "26px";
    previewAv.style.background = color+"22";
    previewAv.style.border = `3px solid ${color}`;
    previewAv.innerHTML = "";
    if (photo) { const img=h("img",{src:photo,alt:"",style:"width:100%;height:100%;object-fit:cover;border-radius:50%"}); previewAv.appendChild(img); }
    else previewAv.textContent = emoji;
  }

  // Photo
  const photoSec = h("div", {style:"margin-bottom:16px"});
  photoSec.appendChild(h("div", {style:"color:var(--sub);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px"}, "Photo"));
  const photoBtns = h("div", {style:"display:flex;gap:8px"});
  const selfieBtn = h("button", {class:"btn-secondary", style:"flex:1;padding:9px"}, "📷 Selfie");
  const galleryBtn= h("button", {class:"btn-secondary", style:"flex:1;padding:9px"}, "🖼️ Gallery");
  selfieBtn.onclick  = () => { fileRef.setAttribute("capture","user"); fileRef.click(); };
  galleryBtn.onclick = () => { fileRef.removeAttribute("capture"); fileRef.click(); };
  photoBtns.append(selfieBtn, galleryBtn);
  photoSec.appendChild(photoBtns);
  sheet.appendChild(photoSec);

  fileRef.addEventListener("change", e => {
    const file = e.target.files?.[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => { photo = ev.target.result; refreshPreview(); };
    reader.readAsDataURL(file);
  });

  // Colors
  const colorSec = h("div", {style:"margin-bottom:16px"});
  colorSec.appendChild(h("div", {style:"color:var(--sub);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px"}, "Colour"));
  const colorRow = h("div", {style:"display:flex;gap:9px;flex-wrap:wrap"});
  COLOR_OPTIONS.forEach(c => {
    const btn = h("button", {style:`width:34px;height:34px;border-radius:17px;background:${c};border:none;outline:${color===c?`3px solid ${c}`:"3px solid transparent"};outline-offset:3px;transform:${color===c?"scale(1.15)":"none"};transition:all .14s`});
    btn.onclick = () => { color=c; refreshPreview(); colorRow.querySelectorAll("button").forEach((b,i)=>{ const cc=COLOR_OPTIONS[i]; b.style.outline=cc===c?`3px solid ${cc}`:"3px solid transparent"; b.style.transform=cc===c?"scale(1.15)":"none"; }); };
    colorRow.appendChild(btn);
  });
  colorSec.appendChild(colorRow);
  sheet.appendChild(colorSec);

  // Emoji grid
  const emojiSec = h("div", {style:"margin-bottom:20px"});
  emojiSec.appendChild(h("div", {style:"color:var(--sub);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px"}, "Emoji"));
  const grid = h("div", {style:"display:grid;grid-template-columns:repeat(8,1fr);gap:5px"});
  AVATAR_OPTIONS.forEach(a => {
    const btn = h("button", {style:`background:${(!photo&&emoji===a)?color+"22":"var(--hi)"};border:1.5px solid ${(!photo&&emoji===a)?color:"var(--border)"};border-radius:9px;padding:5px 0;font-size:18px;transition:all .13s`}, a);
    btn.onclick = () => {
      emoji=a; photo=null; refreshPreview();
      grid.querySelectorAll("button").forEach((b,i)=>{ const av=AVATAR_OPTIONS[i]; b.style.background=av===a?color+"22":"var(--hi)"; b.style.borderColor=av===a?color:"var(--border)"; });
    };
    grid.appendChild(btn);
  });
  emojiSec.appendChild(grid);
  sheet.appendChild(emojiSec);

  // Save
  const saveBtn = h("button", {class:"btn-primary"}, "Save Avatar");
  saveBtn.onclick = () => {
    STATE.friends[index] = {...f, avatar:emoji, color, photo};
    closeModal();
    render();
  };
  sheet.appendChild(saveBtn);
}

function buildLocationModal(sheet, {index}) {

  const hdr = h("div", {style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"});

  sheet.appendChild(hdr);

  // Name field
  sheet.appendChild(h("div", {style:"color:var(--sub);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px"}, "Name"));
  const nameInp = h("input", {class:"inp", placeholder:"Friend\'s name", style:"margin-bottom:14px;display:block", name:"friend_name_"+index, id:"friend_name_"+index, autocorrect:"off"});
  nameInp.value = f.name;
  sheet.appendChild(nameInp);
  sheet.appendChild(h("div", {style:"color:var(--sub);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px"}, "Location"));

  // GPS button
  let gpsState = "idle";
  const gpsBtn = h("button", {style:"width:100%;background:var(--hi);border:1.5px solid var(--border);border-radius:11px;padding:11px;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s"}, "📡 Use My Current Location");
  sheet.appendChild(gpsBtn);

  const gpsErr = h("div", {style:"display:none;color:var(--coral);font-size:12px;margin-bottom:8px;background:var(--coral-l);border-radius:8px;padding:8px 10px;line-height:1.4"});
  sheet.appendChild(gpsErr);

  gpsBtn.onclick = () => {
    if (!navigator.geolocation) { gpsErr.textContent="⚠️ GPS not available in this browser."; gpsErr.style.display="block"; return; }
    gpsBtn.innerHTML = "<span class='spin'></span> Detecting location…";
    gpsErr.style.display = "none";
    navigator.geolocation.getCurrentPosition(
      async pos => {
        try {
          const r = await reverseGeocode(pos.coords.latitude, pos.coords.longitude);
          chosen = r; ac.setValue(r.label);
          gpsBtn.textContent = "✓ GPS location set";
          gpsBtn.style.background = "var(--accent-l)";
          gpsBtn.style.color = "var(--accent)";
          gpsBtn.style.borderColor = "var(--accent)";
          updateSave();
        } catch { gpsBtn.textContent="📡 Use My Current Location"; gpsErr.textContent="⚠️ Could not reverse-geocode position."; gpsErr.style.display="block"; }
      },
      err => {
        gpsBtn.textContent = "📡 Use My Current Location";
        const msgs={1:"Location permission denied.",2:"Position unavailable.",3:"GPS timed out — search manually."};
        gpsErr.textContent="⚠️ "+(msgs[err.code]||"GPS error."); gpsErr.style.display="block";
      },
      {timeout:10000, maximumAge:120000}
    );
  };

  // Divider
  sheet.appendChild(h("div", {style:"display:flex;align-items:center;gap:8px;margin-bottom:10px"}, h("div",{style:"flex:1;height:1px;background:var(--border)"}), h("span",{style:"color:var(--muted);font-size:11px;font-weight:600"},"or search"), h("div",{style:"flex:1;height:1px;background:var(--border)"}) ));

  // Autocomplete
  const ac = buildAutocomplete({
    placeholder:"Type a city, neighbourhood or address…",
    initialValue: f.location,
    onSelect: r => { chosen = r; updateSave(); },
    onInput: () => { chosen = null; updateSave(); },
  });
  sheet.appendChild(ac.el);

  // Save button
  const saveBtn = h("button", {class:"btn-primary", style:"margin-top:16px"}, chosen ? "Save ✓" : "Search or use GPS to set location");
  // Can save if: location is already confirmed (chosen set from existing coords), OR user picks a new one
  saveBtn.disabled = !chosen;
  sheet.appendChild(saveBtn);

  function updateSave() {
    saveBtn.disabled = !chosen;
    saveBtn.textContent = chosen ? "Save ✓" : "Search or use GPS to set location";
  }

  // Allow saving name-only change when location is already set
  nameInp.addEventListener("input", () => {
    if (chosen) { saveBtn.disabled = false; saveBtn.textContent = "Save ✓"; }
  });

  saveBtn.onclick = () => {
    const newName = nameInp.value.trim() || f.name;
    if (chosen) {
      STATE.friends[index] = {...f, name:newName, location:chosen.label, coords:{lat:chosen.lat, lng:chosen.lng}};
    } else {
      STATE.friends[index] = {...f, name:newName};
    }
    closeModal();
    render();
  };
}

function closeBtn() {

function buildFairnessBar(times, colors) {
  const total = times.reduce((a,b)=>a+b,0)||1;
  const bar = h("div",{class:"f-bar"});
  times.forEach((t,i)=>{ const seg=h("div",{style:`flex:${t/total};background:${colors[i]};opacity:.72`}); bar.appendChild(seg); });
  return bar;
}

/* ══════════════════════════════════════════════════════════════
   LEAFLET MAP
══════════════════════════════════════════════════════════════ */
let _mapInstance = null;
let _mapMarkers  = [];

function buildLeafletMap(containerId) {
  if (_mapInstance) { _mapInstance.remove(); _mapInstance=null; }
  const L = window.L;
  if (!L || !STATE.midpt) return;

  _mapInstance = L.map(containerId, {zoomControl:true}).setView([STATE.midpt.lat, STATE.midpt.lng], 14);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap contributors",maxZoom:19}).addTo(_mapInstance);

  const activeFriends = STATE.friends.filter(f=>f.coords);
  const colors = activeFriends.map((_,i)=>FRIEND_COLORS[i]);

  // Midpoint
  const midIcon = L.divIcon({html:`<div style="width:20px;height:20px;border-radius:50%;background:#1A7F5A;border:3px solid white;box-shadow:0 0 14px rgba(26,127,90,.7)"></div>`,iconSize:[20,20],iconAnchor:[10,10],className:""});
  L.marker([STATE.midpt.lat,STATE.midpt.lng],{icon:midIcon}).addTo(_mapInstance).bindPopup("<b>📍 Midpoint</b>").openPopup();

  activeFriends.forEach((f,i)=>{
    const col=colors[i];
    const icon=L.divIcon({html:`<div style="width:36px;height:36px;border-radius:50%;background:${col}22;border:2.5px solid ${col};display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px ${col}66;overflow:hidden">${f.photo?`<img src="${f.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:`<span>${f.avatar}</span>`}</div>`,iconSize:[36,36],iconAnchor:[18,18],className:""});
    L.marker([f.coords.lat,f.coords.lng],{icon}).addTo(_mapInstance).bindPopup(`<b>${f.name}</b><br>${f.location}`);
    L.polyline([[f.coords.lat,f.coords.lng],[STATE.midpt.lat,STATE.midpt.lng]],{color:col,weight:2,opacity:.4,dashArray:"6,6"}).addTo(_mapInstance);
  });

  STATE.venues.slice(0,30).forEach(v=>{
    const icon=L.divIcon({html:`<div style="background:white;border:2px solid #E0DDD5;border-radius:8px;padding:3px 5px;font-size:15px;box-shadow:0 2px 6px rgba(0,0,0,.15);cursor:pointer">${v.icon}</div>`,iconSize:[32,32],iconAnchor:[16,16],className:""});
    const marker=L.marker([v.lat,v.lng],{icon}).addTo(_mapInstance);
    marker.bindTooltip(v.name,{direction:"top",offset:[0,-10]});
    marker.on("click",()=>openModal("venue",{venue:v}));
  });

  const allCoords=[[STATE.midpt.lat,STATE.midpt.lng],...activeFriends.map(f=>[f.coords.lat,f.coords.lng])];
  if(allCoords.length>1) _mapInstance.fitBounds(allCoords,{padding:[40,40]});
}

  const nextBtn=h("button",{class:"btn-primary"},"Find Meeting Areas →");
  nextBtn.disabled=STATE.categories.length===0;
  nextBtn.onclick=()=>loadAreas();
  wrap.appendChild(nextBtn);
  return wrap;
}

/* ── Load candidate areas (Phase 1 ORS) ── */
async function loadAreas() {
  setState({screen:"areas", candidateAreas:[], selectedAreas:[], areaError:"", midpt:null});
  render();
  try {
    const areas = await findCandidateAreas();
    STATE.candidateAreas = areas;
    STATE.areaError = "";
  } catch(e) {
    STATE.areaError = e.message || "Could not compute meeting areas. Check your connection.";
    console.error("ORS area search failed", e);
  }
  render();
}

async function loadResults() {
  // Use the highest-fairness selected area as the search center.
  // Averaging multiple selected centroids pulls the point away from all of them.
  const candidates = STATE.selectedAreas.length > 0
    ? STATE.selectedAreas.map(i => STATE.candidateAreas[i])
    : STATE.candidateAreas.slice(0,1);

  // Pick the single best-fairness candidate as the search anchor
  const best = candidates.reduce((a, b) => b.fairness > a.fairness ? b : a);
  const mp = { lat: best.lat, lng: best.lng };

  setState({screen:"results", venues:[], midpt:null, activeTab:"list", venueError:""});
  render();

  const activeFriends = STATE.friends.filter(f=>f.coords);
  // Use the isochrone bbox of the best candidate for venue search
  const venueBbox = best.bbox || null;
  STATE._lastRadiusM = 4000; // for display purposes only

  try {
    const vs=await fetchVenues(mp.lat, mp.lng, STATE.categories, venueBbox);
    STATE.venues=vs;
    STATE.midpt=mp;
  } catch(e) {
    STATE.midpt=mp;
    STATE.venues=[];
    STATE.venueError="Could not load venues ("+(e.message||"network error")+"). Check your connection and try again.";
    console.error("Venue fetch error",e);
  }
  render();
}

function renderAreas() {
  const wrap=h("div",{class:"screen-pad"});
  wrap.appendChild(h("div",{class:"step-label"},"Step 3 of 4"));
  wrap.appendChild(h("div",{class:"screen-title"},"Choose a meeting area"));
  wrap.appendChild(h("div",{class:"screen-sub"},"These areas are reachable by everyone within similar travel times. Pick one or more, then we'll search for real venues there."));

  // Loading state
  if(STATE.candidateAreas.length===0 && !STATE.areaError) {
    const loading=h("div",{style:"display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px 0"});
    loading.appendChild(h("div",{class:"spin",style:"width:48px;height:48px;border-width:3px"}));
    loading.appendChild(h("div",{style:"font-weight:700;font-size:15px;text-align:center"},"Calculating fair meeting areas…"));
    loading.appendChild(h("div",{style:"color:var(--sub);font-size:12px;text-align:center;max-width:220px;line-height:1.6"},"Drawing travel-time isochrones from each location and finding where they overlap"));
    wrap.appendChild(loading);
    return wrap;
  }

  // Error state
  if(STATE.areaError) {
    wrap.appendChild(h("div",{style:"color:var(--coral);background:var(--coral-l);border:1px solid rgba(201,64,64,.2);border-radius:11px;padding:14px;font-size:13px;line-height:1.5;margin-bottom:16px"},"⚠️ "+STATE.areaError));
    const retry=h("button",{class:"btn-primary"},"Try Again");
    retry.onclick=()=>loadAreas();
    wrap.appendChild(retry);
    return wrap;
  }

  const activeFriends=STATE.friends.filter(f=>f.coords);

  // Area cards — multi-select
  STATE.candidateAreas.forEach((area,i)=>{
    const isSelected=STATE.selectedAreas.includes(i);
    const card=h("div",{class:`area-card${isSelected?" selected":""}`});
    card.onclick=()=>{
      if(isSelected) STATE.selectedAreas=STATE.selectedAreas.filter(x=>x!==i);
      else STATE.selectedAreas.push(i);
      render();
    };

    const header=h("div",{style:"display:flex;justify-content:space-between;align-items:flex-start"});
    header.append(
      h("div",{},
        h("div",{class:"area-name"}, (isSelected?"✓ ":"")+area.label),
        h("div",{class:"area-meta"},`Reachable within ~${area.mins} min drive`)
      ),
      h("div",{style:`width:46px;height:46px;border-radius:23px;background:${isSelected?"var(--accent)":"var(--bg-deep)"};border:2px solid ${isSelected?"var(--accent)":"var(--border)"};display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:${isSelected?"white":"var(--muted)"};flex-shrink:0;transition:all .18s`},area.fairness+"%")
    );
    card.appendChild(header);

    // Per-friend time chips
    const times=h("div",{class:"area-times"});
    activeFriends.forEach((f,fi)=>{
      const chip=h("div",{class:"area-time-chip",style:`background:${FRIEND_COLORS[fi]}18;border-color:${FRIEND_COLORS[fi]}44;color:${FRIEND_COLORS[fi]}`},f.name+": ~"+area.times[fi]+"min");
      times.appendChild(chip);
    });
    card.appendChild(times);
    wrap.appendChild(card);
  });

  // Selection hint
  wrap.appendChild(h("div",{style:"color:var(--sub);font-size:12px;text-align:center;margin:10px 0 16px;line-height:1.5"},STATE.selectedAreas.length>0?`${STATE.selectedAreas.length} area${STATE.selectedAreas.length>1?"s":""} selected — we'll search all of them`:"Tap areas to select. Multiple selections will be combined."));

  const nextBtn=h("button",{class:"btn-primary"},STATE.selectedAreas.length>0?"Search Venues in Selected Areas →":"Search Venues in Top Area →");
  nextBtn.onclick=()=>loadResults();
  wrap.appendChild(nextBtn);
  return wrap;
}



function renderResults() {
  const wrap=h("div",{});
  const activeFriends=STATE.friends.filter(f=>f.coords);
  const colors=activeFriends.map((_,i)=>FRIEND_COLORS[i]);

  // Loading state
  if (!STATE.midpt) {
    const loading=h("div",{style:"display:flex;flex-direction:column;align-items:center;justify-content:center;height:420px;gap:16px"});
    loading.appendChild(h("div",{class:"spin",style:"width:48px;height:48px;border-width:3px"}));
    loading.appendChild(h("div",{style:"font-weight:700;font-size:15px"},"Searching for venues…"));
    loading.appendChild(h("div",{style:"color:var(--sub);font-size:12px;text-align:center;max-width:220px"},"Fetching real venues in your chosen area from OpenStreetMap"));
    wrap.appendChild(loading);
    return wrap;
  }

  // Banner
  const cA=activeFriends[0]?.location?.split(",")[0]||"";
  const cB=activeFriends[1]?.location?.split(",")[0]||"";
  const banner=h("div",{class:"banner"});
  const bannerTop=h("div",{style:"display:flex;justify-content:space-between;align-items:flex-start"});
  bannerTop.append(
    h("div",{},
      h("div",{class:"banner-label"},"Midpoint Found"),
      h("div",{class:"banner-title"},cA&&cB?`Between ${cA} & ${cB}`:"Your Group Midpoint"),
      h("div",{style:"color:var(--sub);font-size:12px"},STATE.venues.length+" real venues found nearby")
    ),
    h("div",{style:"text-align:right"},h("div",{style:"color:var(--muted);font-size:10px"},"FRIENDS"),h("div",{style:"font-size:22px;font-weight:900"},activeFriends.length))
  );
  banner.appendChild(bannerTop);
  const friendChips=h("div",{style:"display:flex;gap:7px;margin-top:10px;flex-wrap:wrap"});
  activeFriends.forEach((f,i)=>{
    const chip=h("div",{style:`background:var(--surface);border-radius:99px;padding:4px 10px;display:flex;align-items:center;gap:5px;border:1px solid ${colors[i]}44;box-shadow:0 1px 3px var(--sh)`});
    chip.append(avatarEl(f,17),h("span",{style:`color:${colors[i]};font-weight:700;font-size:12px`},f.name));
    friendChips.appendChild(chip);
  });
  banner.appendChild(friendChips);
  wrap.appendChild(banner);

  // Tabs
  const tabs=h("div",{class:"tabs"});
  [["list","📋 List"],["map","🗺️ Map"],["vote","🗳️ Vote"]].forEach(([id,lb])=>{
    const tab=h("button",{class:`tab${STATE.activeTab===id?" active":""}`},lb);
    tab.onclick=()=>{STATE.activeTab=id;render();};
    tabs.appendChild(tab);
  });
  wrap.appendChild(tabs);

  // Tab content
  const content=h("div",{style:"padding:14px 14px 100px"});

  if (STATE.activeTab==="list") {
    // Filter chips
    const filterRow=h("div",{style:"display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px"});
    const allPill=h("button",{class:`pill${STATE.venueFilter==="all"?" active":""}`},"All ("+STATE.venues.length+")");
    allPill.onclick=()=>{STATE.venueFilter="all";render();};
    filterRow.appendChild(allPill);
    STATE.categories.forEach(id=>{
      const cat=CATEGORIES.find(c=>c.id===id);
      const cnt=STATE.venues.filter(v=>v.cat===id).length;
      if(!cat||!cnt) return;
      const p=h("button",{class:`pill${STATE.venueFilter===id?" active":""}`},cat.icon+" "+cat.label+" ("+cnt+")");
      p.onclick=()=>{STATE.venueFilter=id;render();};
      filterRow.appendChild(p);
    });
    content.appendChild(filterRow);

    const shown=STATE.venueFilter==="all"?STATE.venues:STATE.venues.filter(v=>v.cat===STATE.venueFilter);
    if(STATE.venueError) {
      content.appendChild(h("div",{style:"color:var(--coral);background:var(--coral-l);border:1px solid rgba(201,64,64,.2);border-radius:11px;padding:14px;font-size:13px;line-height:1.5;margin-bottom:12px"},"⚠️ "+STATE.venueError));
    }
    if(shown.length===0) {
      const msg = STATE.venueError ? "" :
        STATE.venues.length===0
          ? "No venues found near your midpoint (searched "+Math.round(STATE._lastRadiusM/1000)+"km radius). Try adding more categories or check the map tab."
          : "No venues for this category.";
      if(msg) content.appendChild(h("div",{style:"color:var(--sub);text-align:center;padding:40px 0;font-size:13px"},msg));

      // Retry button
      if(!STATE.venueError) {
        const retry = h("button",{class:"btn-primary",style:"max-width:240px;margin:0 auto;display:block"},"🔄 Try Again");
        retry.onclick = () => loadResults();
        content.appendChild(retry);
      }
    }

    shown.slice(0,30).forEach(v=>{
      const times=activeFriends.map(f=>estimateMins(f.coords,{lat:v.lat,lng:v.lng},STATE.travelMode));
      const pct=fairnessPct(times);
      const isSaved=STATE.saved.includes(v.id);
      const isOpen=STATE.venueFilter===v.id+"open"; // toggled below

      const card=h("div",{class:"venue-card"});
      const top=h("div",{style:"display:flex;justify-content:space-between;margin-bottom:8px"});
      const left=h("div",{style:"display:flex;gap:10px;flex:1"});
      left.append(
        h("div",{class:"venue-icon-box"}, v.icon || "📍"),
        h("div",{style:"flex:1"},
          h("div",{style:"font-weight:700;font-size:14px"},v.name),
          h("div",{style:"color:var(--sub);font-size:11px;margin-top:1px"},
            (v.cuisine ? v.cuisine+" · " : "") + (v.address || CATEGORIES.find(c=>c.id===v.cat)?.label || "")
          )
        )
      );
      const star=h("button",{style:`background:transparent;border:none;font-size:18px;color:${isSaved?"var(--gold)":"var(--border-m)"}`,type:"button"},isSaved?"★":"☆");
      star.onclick=(e)=>{e.stopPropagation();if(isSaved)STATE.saved=STATE.saved.filter(x=>x!==v.id);else STATE.saved.push(v.id);render();};
      top.append(left,star);
      card.appendChild(top);

      // Fairness
      const fairSec=h("div",{});
      const fairHdr=h("div",{style:"display:flex;justify-content:space-between;margin-bottom:4px"});
      fairHdr.append(h("div",{style:"color:var(--sub);font-size:10px;font-weight:700;letter-spacing:.05em"},"TRAVEL FAIRNESS"),h("span",{class:`fairness-pct ${pct>80?"hi":pct>60?"md":"lo"}`},String(pct)+"%"));
      fairSec.appendChild(fairHdr);
      fairSec.appendChild(buildFairnessBar(times,colors));
      const tLabels=h("div",{style:"display:flex;gap:9px;margin-top:4px;flex-wrap:wrap"});
      activeFriends.forEach((f,i)=>tLabels.appendChild(h("span",{style:`font-size:10px;color:${colors[i]};font-weight:600`},f.name+": ~"+times[i]+"min")));
      fairSec.appendChild(tLabels);
      card.appendChild(fairSec);

      card.onclick=()=>openModal("venue",{venue:v});
      content.appendChild(card);
    });
  }

  else if (STATE.activeTab==="map") {
    const mapDiv=h("div",{id:"map"});
    content.appendChild(mapDiv);
    content.appendChild(h("div",{style:"color:var(--sub);font-size:11px;text-align:center;margin-top:8px"},"Tap any venue pin for details · Dashed lines show travel routes"));
    // Defer map init until DOM is attached
    setTimeout(()=>buildLeafletMap("map"),50);
  }

  else if (STATE.activeTab==="vote") {
    const voteBanner=h("div",{style:"background:var(--accent-l);border-radius:11px;padding:11px 13px;margin-bottom:14px;border:1px solid rgba(26,127,90,.25)"});
    voteBanner.append(h("div",{style:"color:var(--accent);font-weight:700;font-size:13px"},"🗳️ Group Voting"),h("div",{style:"color:var(--sub);font-size:12px;margin-top:2px;line-height:1.5"},"Vote on real venues near your midpoint. Share the link so everyone can weigh in."));
    content.appendChild(voteBanner);

    STATE.venues.slice(0,12).forEach(v=>{
      const mv=STATE.votes[v.id];
      const card=h("div",{class:"vote-card"});
      card.append(
        h("div",{style:"width:38px;height:38px;border-radius:9px;background:var(--hi);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0"},v.icon),
        h("div",{style:"flex:1;min-width:0"},h("div",{style:"font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"},v.name),h("div",{style:"color:var(--sub);font-size:11px"},v.address||CATEGORIES.find(c=>c.id===v.cat)?.label||""))
      );
      const voteBtns=h("div",{style:"display:flex;gap:5px;flex-shrink:0"});
      const upBtn=h("button",{class:`vote-btn${mv==="up"?" up":""}`},"👍");
      const dnBtn=h("button",{class:`vote-btn${mv==="down"?" down":""}`},"👎");
      upBtn.onclick=()=>{STATE.votes[v.id]=mv==="up"?null:"up";render();};
      dnBtn.onclick=()=>{STATE.votes[v.id]=mv==="down"?null:"down";render();};
      voteBtns.append(upBtn,dnBtn);
      card.appendChild(voteBtns);
      content.appendChild(card);
    });

    const shareBtn=h("button",{class:"btn-primary",style:"margin-top:8px"},"📤 Share Voting Link");
    shareBtn.onclick=()=>{
      const url=window.location.href;
      if(navigator.share){navigator.share({title:"Meet Me In The Middle",url});}
      else if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>alert("Link copied to clipboard!"));}
      else alert("Share URL: "+url);
    };
    content.appendChild(shareBtn);
  }

  wrap.appendChild(content);
  return wrap;
}

/* ══════════════════════════════════════════════════════════════
   MAIN RENDER
══════════════════════════════════════════════════════════════ */
function render() {
  const scr=document.getElementById("screen");
  scr.innerHTML="";

  // Nav bar for inner screens
  if (STATE.screen!=="home") {
    const nav=h("div",{class:"nav-bar"});
    const backBtn=h("button",{class:"nav-btn"},"← Back");
    backBtn.onclick=()=>{
      if(_mapInstance){_mapInstance.remove();_mapInstance=null;}
      const prev={friends:"home",categories:"friends",areas:"categories",results:"areas"};
      const nextScreen = prev[STATE.screen]||"home";
      if (nextScreen === "home") {
        // Reset session state so next planning starts fresh
        STATE.friends = [{ id:0, name:"Me", avatar:"🧑", color:FRIEND_COLORS[0], photo:null, location:"", coords:null }];
        STATE.categories = ["restaurant","bar","cafe"];
        STATE.vibe = "casual";
        STATE.venues = [];
        STATE.midpt = null;
        STATE.candidateAreas = [];
        STATE.selectedAreas = [];
        STATE.votes = {};
        STATE.saved = [];
        STATE.venueError = "";
        STATE.areaError = "";
        STATE.activeTab = "list";
        STATE.venueFilter = "all";
      }
      setState({screen:nextScreen});
      render();
    };
    const infoBtn=h("button",{class:"nav-icon-btn"},"ⓘ");
    infoBtn.onclick=()=>openModal("info");
    nav.append(backBtn, h("div",{class:"nav-title"},"📍 ",h("span",{},"MMITM")), infoBtn);
    scr.appendChild(nav);
  }

  let content;
  if      (STATE.screen==="home")       content=renderHome();
  else if (STATE.screen==="friends")    content=renderFriends();
  else if (STATE.screen==="categories") content=renderCategories();
  else if (STATE.screen==="areas")      content=renderAreas();
  else if (STATE.screen==="results")    content=renderResults();

  if (content) scr.appendChild(content);
}

/* ══════════════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════════════ */
// Update clock
function updateClock(){
  const now=new Date();
  const el=document.querySelector(".status-bar span");
  if(el) el.textContent=now.getHours()+":"+(now.getMinutes()+"").padStart(2,"0");
}
setInterval(updateClock,30000);
updateClock();

// Register service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}

render();

// Auto-detect location for the first friend (slot 0) on startup
(async () => {
  if (!navigator.geolocation) return;
  try {
    await new Promise((resolve, reject) =>
      navigator.geolocation.getCurrentPosition(resolve, reject, {timeout:8000, maximumAge:120000})
    ).then(async pos => {
      try {
        const r = await reverseGeocode(pos.coords.latitude, pos.coords.longitude);
        if (STATE.friends[0] && !STATE.friends[0].coords) {
          STATE.friends[0].location = r.label;
          STATE.friends[0].coords   = {lat: r.lat, lng: r.lng};
          if (STATE.screen === "friends") render();
        }
      } catch(e) { /* reverse geocode failed, silently ignore */ }
    });
  } catch(e) { /* GPS denied or unavailable, silently ignore */ }
})();
</script>
